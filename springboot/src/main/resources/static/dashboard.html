<!DOCTYPE html>
<html>
    <body>

        <h1>Robot Dashboard</h1>

        <p>Machine State: <span id="machineState"></span></p>
        <p>Positions: <span id="positions"></span></p>
        <p>Velocities: <span id="velocities"></span></p>

        <script>
            async function update() {
                const data = await fetch("/api/robot/state").then(r => r.json()); // fetch state from RESTful API and parse as json

                document.getElementById("machineState").innerText = data.machineState;
                document.getElementById("positions").innerText = data.pos.join(", ");
                document.getElementById("velocities").innerText = data.vels.join(", ");
            }

            setInterval(update, 1000);
        </script>

    </body>
</html>

<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8">
        <title>Robot Dashboard</title>
        <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
        <link rel="stylesheet" href="/css/dashboard.css">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    </head>
    <body>

        <div class="header">Robot Dashboard</div>

        <div class="container">
            <!--LEADER-->
            <div class="card">
                <div class="title">Leader machine state</div>
                <div id="leaderMachineState" class="value">-</div>
            </div>

            <div class="card">
                <div class="title">Leader positions</div>
                <div id="leaderPositions" class="list">-</div>
            </div>

            <div class="card">
                <div class="title">Leader velocities</div>
                <div id="leaderVels" class="list">-</div>
            </div>

            <!--FOLLOWER-->
            <div class="card">
                <div class="title">Follower machine state</div>
                <div id="followerMachineState" class="value">-</div>
            </div>

            <div class="card">
                <div class="title">Follower positions</div>
                <div id="followerPositions" class="list">-</div>
            </div>

            <div class="card">
                <div class="title">Follower velocities</div>
                <div id="followerVels" class="list">-</div>
            </div>

        </div>

        <div class="arm-switch-buttons">
            <button id="leader" class="arm-switch-button-clicked" onclick="selectArm('leader')">Leader</button>
            <button id="follower" class="arm-switch-button" onclick="selectArm('follower')">Follower</button>
        </div>

        <div>
            <input id="joint0_slider" type=range min="-100" max="100">
            <input id="joint1_slider" type=range min="-100" max="100">
            <input id="joint2_slider" type=range min="-100" max="100">
            <input id="joint3_slider" type=range min="-100" max="100">
            <input id="joint4_slider" type=range min="-100" max="100">
            <input id="joint5_slider" type=range min="-100" max="100">
        </div>

        <div class="chart-container">
            <div class="joint-buttons">
                <button id="joint0" class="joint-button-clicked" onclick="selectJoint(0)">Joint 0</button>
                <button id="joint1" class="joint-button" onclick="selectJoint(1)">Joint 1</button>
                <button id="joint2" class="joint-button" onclick="selectJoint(2)">Joint 2</button>
                <button id="joint3" class="joint-button" onclick="selectJoint(3)">Joint 3</button>
                <button id="joint4" class="joint-button" onclick="selectJoint(4)">Joint 4</button>
                <button id="joint5" class="joint-button" onclick="selectJoint(5)">Joint 5</button>
            </div>

            <div class="card">
                <div id="chartTitle" class="title">Live Tracking (Joint 0)</div>
                <canvas id="posChart"></canvas>
            </div>
        </div>

        <script src="/js/dashboard.js"></script>

    </body>
</html>
